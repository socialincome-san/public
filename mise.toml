[tools]
node = "24"
java = "25.0.2+10.0.LTS"

[tasks.install]
run = "npm ci"

[tasks.db]
run = "npm run db:up"

[tasks.firebase]
run = "npm run firebase:serve"
depends = ["install"]

[tasks.build-paths]
run = "npm run website:build-paths"
depends = ["install"]

[tasks.website]
run = "npm run website:serve"
depends = ["install", "db", "build-paths"]

[tasks.website-ssl]
run = "npm run website:serve:ssl"
depends = ["install", "db", "build-paths"]

[tasks.dev]
depends = ["firebase", "website"]

[tasks.dev-ssl]
depends = ["firebase", "website-ssl"]
