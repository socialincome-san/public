[tools]
node = "24"
java = "23"

[tasks.install]
run = "npm install"

[tasks.db]
run = "npm run db:up"

[tasks.mockserver]
run = "npm run mockserver:up"

[tasks.firebase]
run = "npm run firebase:serve"
depends = ["install"]

[tasks.website]
run = "npm run website:serve"
depends = ["install", "db", "mockserver"]

[tasks.dev]
run = [{ tasks = ["firebase", "website"] }]
depends_post = ["stop"]

[tasks.stop]
run = "npm run mockserver:down && npm run db:down"
