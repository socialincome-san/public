name: Website

on:
  pull_request:
    paths-ignore:
      - "recipients_app/**"
  merge_group:
  push:
    branches:
      - main
    paths-ignore:
      - "recipients_app/**"
jobs:
  safe-chain:
    name: "🔒 Safe Chain Dependency Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install Safe Chain (CI)
        run: |
          curl -fsSL https://github.com/AikidoSec/safe-chain/releases/latest/download/install-safe-chain.sh \
            | sh -s -- --ci

          echo "$HOME/.safe-chain/shims" >> $GITHUB_PATH
          echo "$HOME/.safe-chain/bin" >> $GITHUB_PATH

      - name: Install dependencies (protected by Safe Chain)
        working-directory: website
        run: npm ci --no-audit --no-fund

  lint:
    name: "✨ Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json
      - working-directory: website
        run: npm ci --no-audit --no-fund
      - working-directory: website
        run: npm run db:generate
      - working-directory: website
        run: npm run lint

  format-check:
    name: "💅 Format Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json
      - working-directory: website
        run: npm ci --no-audit --no-fund
      - working-directory: website
        run: npm run format:check

  check-unused:
    name: "✂️ Check unused Code"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json
      - working-directory: website
        run: npm ci --no-audit --no-fund
      - working-directory: website
        run: npm run db:generate
      - working-directory: website
        run: npm run check:unused

  typecheck:
    name: "🔍 Type Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json
      - working-directory: website
        run: npm ci --no-audit --no-fund
      - working-directory: website
        run: npm run db:generate
      - working-directory: website
        run: npm run typecheck

  storybook-build:
    name: "📚 Storybook Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json
      - working-directory: website
        run: npm ci --no-audit --no-fund
      - working-directory: website
        run: npm run build-storybook

  unit-test:
    name: "🧪 Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json
      - working-directory: website
        run: npm ci --no-audit --no-fund
      - working-directory: website
        run: npm run db:generate
      - working-directory: website
        run: npm run test:unit

  terraform:
    name: "📐 Terraform Validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: 1.6.6
      - run: terraform -chdir=website/infra init -backend=false
      - run: terraform -chdir=website/infra fmt -check
      - run: terraform -chdir=website/infra validate

  e2e:
    name: "🏗️ Build & 📸 E2E Tests"
    runs-on: ubuntu-latest
    needs:
      - safe-chain
      - lint
      - format-check
      - check-unused
      - typecheck
      - storybook-build
      - unit-test
      - terraform

    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy@sha256:e1529a04087193966ea15d4a1617345bdaa0791690a24ab2c42b65f9ce5b2cdc

    services:
      postgres:
        image: postgres:18-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
        env:
          POSTGRES_USER: social-income
          POSTGRES_PASSWORD: social-income
          POSTGRES_DB: social-income
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U social-income"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://social-income:social-income@postgres:5432/social-income
      STORYBLOK_PREVIEW_SECRET: ${{ secrets.TF_STAGING_STORYBLOK_PREVIEW_SECRET }}
      STORYBLOK_PREVIEW_TOKEN: ${{ secrets.TF_STAGING_STORYBLOK_PREVIEW_TOKEN }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.TF_STAGING_STRIPE_WEBHOOK_SECRET }}
      STRIPE_SECRET_KEY: ${{ secrets.TF_STAGING_STRIPE_SECRET_KEY }}
      STRIPE_PRODUCT_RECURRING: ${{ secrets.TF_STAGING_STRIPE_PRODUCT_RECURRING }}
      STRIPE_PRODUCT_ONETIME: ${{ secrets.TF_STAGING_STRIPE_PRODUCT_ONETIME }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.TF_STAGING_STRIPE_PUBLISHABLE_KEY }}
      GITHUB_PAT: ${{ secrets.TF_STAGING_GITHUB_PAT }}
      HOME: /root

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: true

      - name: Initialize repository
        uses: ./.github/workflows/actions/init

      - name: Run E2E snapshot update
        if: github.actor != 'renovate[bot]'
        working-directory: website
        run: npm run test:e2e:update

      - name: Run E2E tests (no snapshot update)
        if: github.actor == 'renovate[bot]'
        working-directory: website
        run: npm run test:e2e

      - name: Mark repo as safe
        if: github.actor != 'renovate[bot]'
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Commit and push updated snapshots
        if: github.actor != 'renovate[bot]'
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7
        with:
          commit_message: "chore: update snapshots (CI auto-commit)"
          branch: ${{ github.head_ref }}
          commit_user_name: github-actions
          commit_user_email: actions@github.com
          file_pattern: |
            **/__screenshots__/**
            **/snapshots/**

      - name: Upload Test Report (only if failure)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report-${{ github.sha }}
          path: |
            website/playwright-report/
            website/test-results/
